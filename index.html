<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🚀 לוח פרסום</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;min-height:100vh;padding:20px;color:white}
h1{text-align:center;font-size:22px;margin-bottom:6px;color:#5eead4}
.sub{text-align:center;font-size:13px;color:#475569;margin-bottom:24px}
.token-row{display:flex;gap:8px;margin-bottom:20px}
.token-inp{flex:1;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:11px 14px;color:white;font-size:14px;outline:none;text-align:right;font-family:inherit}
.token-inp:focus{border-color:#5eead4}
.token-btn{background:#0d9488;border:none;border-radius:12px;padding:11px 16px;color:white;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap;font-family:inherit}
.sites-grid{display:flex;flex-direction:column;gap:12px}
.site-card{background:#1e293b;border-radius:16px;padding:16px;border:1px solid #334155}
.site-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.site-name{font-size:16px;font-weight:800;color:white}
.site-repo{font-size:11px;color:#475569;margin-top:2px}
.site-actions{display:flex;gap:8px;align-items:center}
.deploy-btn{background:linear-gradient(135deg,#0d9488,#0f766e);border:none;border-radius:10px;padding:9px 16px;color:white;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:6px}
.deploy-btn:disabled{opacity:.5}
.status{font-size:11px;color:#5eead4;margin-top:8px;min-height:16px}
.add-site{background:#1e293b;border:2px dashed #334155;border-radius:16px;padding:16px;text-align:center;cursor:pointer;color:#475569;font-size:14px;font-weight:700;margin-top:8px;font-family:inherit;width:100%}
.add-site:hover{border-color:#5eead4;color:#5eead4}
.add-form{background:#1e293b;border-radius:16px;padding:16px;border:1px solid #0d9488;margin-top:8px;display:none}
.add-form.show{display:block}
.add-inp{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 14px;color:white;font-size:14px;outline:none;text-align:right;font-family:inherit;margin-bottom:8px}
.add-inp:focus{border-color:#5eead4}
.add-btns{display:flex;gap:8px}
.btn-save{flex:1;background:#0d9488;border:none;border-radius:10px;padding:10px;color:white;font-weight:700;cursor:pointer;font-family:inherit}
.btn-cancel{flex:1;background:#334155;border:none;border-radius:10px;padding:10px;color:white;font-weight:700;cursor:pointer;font-family:inherit}
.del-btn{background:#7f1d1d;border:none;border-radius:8px;padding:6px 10px;color:#fca5a5;cursor:pointer;font-size:11px;font-family:inherit}
</style>
</head>
<body>
<h1>🚀 לוח פרסום</h1>
<p class="sub">עדכן כל אתר בלחיצה אחת</p>

<div class="token-row">
  <input class="token-inp" id="gh-token" type="password" placeholder="GitHub Token שלך..." dir="ltr">
  <button class="token-btn" onclick="saveToken()">💾 שמור</button>
</div>

<div class="sites-grid" id="sites-grid"></div>

<button class="add-site" onclick="toggleAddForm()">+ הוסף אתר חדש</button>

<div class="add-form" id="add-form">
  <input class="add-inp" id="new-name" placeholder="שם האתר (למשל: הודיה)">
  <input class="add-inp" id="new-repo" placeholder="שם הריפו בגיטהאב (למשל: therapy-hodaya)" dir="ltr">
  <input class="add-inp" id="new-owner" placeholder="שם המשתמש בגיטהאב" dir="ltr" value="pinto1212121212-create">
  <div class="add-btns">
    <button class="btn-cancel" onclick="toggleAddForm()">ביטול</button>
    <button class="btn-save" onclick="addSite()">➕ הוסף</button>
  </div>
</div>

<script>
const DEFAULT_SITES=[
  {id:'hodaya',name:'💙 היומן שלי — הודיה',repo:'therapy-hodaya',owner:'pinto1212121212-create'},
  {id:'rinat',name:'📖 היומן שלנו — רינת ודניאל',repo:'diary-rinat',owner:'pinto1212121212-create'}
];

function getSites(){try{return JSON.parse(localStorage.getItem('deploy_sites'))||DEFAULT_SITES;}catch(e){return DEFAULT_SITES;}}
function saveSites(s){localStorage.setItem('deploy_sites',JSON.stringify(s));}
function getToken(){return localStorage.getItem('gh_deploy_token')||'';}
function saveToken(){const t=document.getElementById('gh-token').value.trim();if(t){localStorage.setItem('gh_deploy_token',t);document.getElementById('gh-token').value='';alert('✅ Token נשמר!');}}

function renderSites(){
  const grid=document.getElementById('sites-grid');
  const sites=getSites();
  const token=getToken();
  if(!token){
    document.getElementById('gh-token').placeholder='הכנס GitHub Token קודם...';
  }
  grid.innerHTML=sites.map(s=>`
    <div class="site-card">
      <div class="site-card-top">
        <div>
          <div class="site-name">${s.name}</div>
          <div class="site-repo">${s.owner}/${s.repo}</div>
        </div>
        <div class="site-actions">
          <button class="del-btn" onclick="deleteSite('${s.id}')">🗑</button>
        </div>
      </div>
      <input type="file" accept=".html" id="file-${s.id}" style="display:none" onchange="doUpload('${s.id}','${s.repo}','${s.owner}',this)">
      <button class="deploy-btn" id="btn-${s.id}" onclick="document.getElementById('file-${s.id}').click()">
        🚀 בחר קובץ ופרסם
      </button>
      <div class="status" id="status-${s.id}"></div>
    </div>
  `).join('');
}

function doUpload(id,repo,owner,input){
  const file=input.files[0];
  if(!file)return;
  const token=getToken();
  if(!token){alert('נא להכניס GitHub Token קודם');return;}
  const btn=document.getElementById('btn-'+id);
  const status=document.getElementById('status-'+id);
  btn.disabled=true;btn.textContent='⏳ מעלה...';status.textContent='';
  const reader=new FileReader();
  reader.onload=ev=>{
    const content=ev.target.result;
    const encoded=btoa(unescape(encodeURIComponent(content)));
    const apiUrl=`https://api.github.com/repos/${owner}/${repo}/contents/index.html`;
    fetch(apiUrl,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
      .then(r=>r.json())
      .then(data=>{
        const body={message:'Update from deploy panel',content:encoded};
        if(data.sha)body.sha=data.sha;
        return fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
      })
      .then(r=>r.json())
      .then(d=>{
        if(d.content){
          btn.textContent='✅ עלה בהצלחה!';btn.style.background='#059669';
          status.textContent='האתר יתעדכן תוך דקה';
          setTimeout(()=>{btn.textContent='🚀 בחר קובץ ופרסם';btn.disabled=false;btn.style.background='';status.textContent='';input.value='';},4000);
        } else {
          btn.textContent='❌ שגיאה';btn.disabled=false;
          status.textContent=d.message||'נסה שוב';
          setTimeout(()=>{btn.textContent='🚀 בחר קובץ ופרסם';status.textContent='';},3000);
        }
      })
      .catch(()=>{btn.textContent='❌ שגיאה';btn.disabled=false;setTimeout(()=>{btn.textContent='🚀 בחר קובץ ופרסם';},3000);});
  };
  reader.readAsText(file);
}

function toggleAddForm(){
  const f=document.getElementById('add-form');
  f.classList.toggle('show');
}

function addSite(){
  const name=document.getElementById('new-name').value.trim();
  const repo=document.getElementById('new-repo').value.trim();
  const owner=document.getElementById('new-owner').value.trim();
  if(!name||!repo||!owner){alert('נא למלא את כל השדות');return;}
  const sites=getSites();
  sites.push({id:'site_'+Date.now(),name,repo,owner});
  saveSites(sites);
  document.getElementById('new-name').value='';
  document.getElementById('new-repo').value='';
  toggleAddForm();
  renderSites();
}

function deleteSite(id){
  if(!confirm('למחוק אתר זה?'))return;
  const sites=getSites().filter(s=>s.id!==id);
  saveSites(sites);
  renderSites();
}

// Load token if saved
window.onload=()=>{renderSites();};
</script>
</body>
</html>
